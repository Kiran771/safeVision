<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Incident - Accident Detection System</title>
    <link rel="stylesheet" href="/css/verify_incident_detail.css">
    <script src="/js/auth_guard.js"></script>
    <script src="/js/verify_incident_detail.js?v=1" defer></script>
</head>

<body>
    <div class="verify-container">
        <header class="verify-header">
            <h1>Verify Incident</h1>
        </header>

        <div class="content-wrapper">
            <div class="left-section">
                <div class="top-row">
                    <div class="confidence-section">
                        <h2>Confidence Score</h2>
                        <div class="confidence-bar-container">
                            <div class="confidence-bar" id="confidence-bar">
                                <div class="confidence-fill" id="confidence-fill"></div>
                            </div>
                        </div>
                        <div class="confidence-score-text" id="confidence-score-text">
                            Confidence Score: 0.92
                        </div>
                    </div>

                    <div class="new-element location-info">
                        <h2>Location</h2>
                        <div class="location-card">
                            <div class="location-item">
                                <strong>Address:</strong>
                                <span id="location-address">Main St & 5th Ave</span>
                            </div>

                        </div>
                    </div>

                    <div class="incident-details-card">
                        <h2>Incident Details</h2>
                        <div class="incident-details-inner">
                            <div class="detail-item">
                                <span class="detail-label">Time:</span>
                                <span class="detail-value" id="incident-time">1:11 PM</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Confidence:</span>
                                <span class="detail-value" id="confidence">90%</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="frames-section">
                    <div class="frame-container">
                        <h3>Detected Frame</h3>
                        <div class="frame-box" id="original-frame">
                            <img src="" alt="Detected Frame" id="original-img">
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-confirm" id="confirm-btn">Confirm</button>
                    <button class="btn btn-reject" id="reject-btn">Reject</button>
                </div>

                <button class="btn btn-cancel" id="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>
</body>

</html>
